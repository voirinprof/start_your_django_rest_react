services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geo-stack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geodb}
      POSTGRES_USER: ${POSTGRES_USER:-geouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geopassword}
    volumes:
      - postgis_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geouser} -d ${POSTGRES_DB:-geodb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: geo-stack-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: geo-stack-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

volumes:
  postgis_data:
